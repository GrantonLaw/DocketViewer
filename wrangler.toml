name = "docketviewer2"
compatibility_date = "2026-06-03"
main = "worker.js"
account_id = "660f6fb4bd0db8c8821df738c7eda7f1"
workers_dev = true

# Static HTML served from ./public (worker.js stays outside it, so it is never exposed)
[assets]
directory = "./public"
binding = "ASSETS"

# Production origins
[vars]
ALLOWED_ORIGINS = "https://docketviewer.grantonlaw.ca"

# Local dev origins — run with: wrangler dev --env=development
[env.development]
vars = { ALLOWED_ORIGINS = "http://localhost:8787,http://localhost:3000" }

# Beta — separate Worker for testing new features before they reach main.
# Deploy with: wrangler deploy --env beta
[env.beta]
name = "docketviewerbeta"
vars = { ALLOWED_ORIGINS = "https://docketviewerbeta.grantonlaw.ca,https://docketviewerbeta.grantonlaw.com" }

[env.beta.assets]
directory = "./public"
binding = "ASSETS"

# Secrets — set once per Worker, persist across deploys:
#   wrangler secret put GEMINI_API_KEY               (production)
#   wrangler secret put GEMINI_API_KEY --env beta    (beta)
